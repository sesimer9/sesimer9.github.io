<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>APIテスト</title>
</head>
<body>
  APIテスト中...

  <script>
fetch('https://secure02.blue.shared-server.net/www.sesim.co.jp/judge.php', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  },
  body: JSON.stringify({
    lat: 35.6844,
    lng: 139.7745
  })
})
  .then(r => r.json())
  .then(data => {
    if (data.hit) {
      console.log('路線名:', data.matched?.display_name);
      console.log('路線種別:', data.matched?.route_type);
      console.log('区間:', data.matched?.section_text);
    } else {
      console.log('対象路線なし');
    }
  });
</script>
</body>
</html>
