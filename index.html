<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交通誘導検定者配置路線 検索・判定アプリ［参考版］</title>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
<link rel="stylesheet" href="./style.css" />
<link rel="preconnect" href="https://unpkg.com" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script>window.GSI = window.GSI || {};</script>
<script src="https://maps.gsi.go.jp/js/muni.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  
</head>
<body>
  <header class="page-title">
    <h1>交通誘導検定者配置路線 検索・判定アプリ［参考版］</h1>
  </header>

  <div class="app">
    <aside class="sidebar">
  <div id="emailCard" class="card">
    <strong>利用者メール登録</strong>
    <form id="emailForm" method="POST">
      <div class="grid1" style="margin-top:12px;">
        <div>
          <label for="userEmail">メールアドレス<span class="required">*</span></label>
          <input
            id="userEmail"
            name="email"
            type="email"
            placeholder="example@company.co.jp"
            autocomplete="email"
            required
          />
        </div>

        <input type="hidden" id="eventTypeField" name="eventType" value="email_capture">
        <input type="hidden" id="pageField" name="page" value="">
        <input type="hidden" id="userAgentField" name="userAgent" value="">
        <input type="hidden" id="userLatField" name="userLat" value="">
        <input type="hidden" id="userLngField" name="userLng" value="">
        <input type="hidden" id="userAccuracyField" name="userAccuracy" value="">
        <input type="hidden" id="userAddressRawField" name="userAddressRaw" value="">
        <input type="hidden" id="userAreaLabelField" name="userAreaLabel" value="">
        <input type="hidden" id="searchTypeField" name="searchType" value="">
        <input type="hidden" id="keywordField" name="keyword" value="">
        <input type="hidden" id="searchedLatField" name="searchedLat" value="">
        <input type="hidden" id="searchedLngField" name="searchedLng" value="">
        <input type="hidden" id="resultLabelField" name="resultLabel" value="">
        <input type="hidden" id="hitCountField" name="hitCount" value="">
      </div>

      <div class="row" style="margin-top:12px;">
        <button id="submitEmail" type="submit">メールを登録</button>
      </div>
    </form>
    <iframe name="emailLogIframe" class="hidden-frame"></iframe>
    <div id="emailStatus" class="status hidden"></div>
    <p class="mini">一度入力したメールは、使える環境では次回以降自動入力します。</p>
  </div>

  <div id="appBody" class="hidden">
    <div class="card controls-card">
      <div class="grid1">
        <div>
          <label for="address">住所・駅名・施設名検索</label>
          <input
            id="address"
            type="text"
            placeholder="例：江東区新砂1-6-35 / 高井戸駅 / 東京ビッグサイト"
          />
        </div>

        <div class="row">
          <button id="searchByAddress" type="button">場所で判定</button>
          <button id="searchByCurrent" type="button" class="secondary">現在地で判定</button>
        </div>

        <div class="toolbar">
          <button id="showAll" type="button" class="secondary">広く表示</button>
          <button id="clearMap" type="button" class="secondary">結果クリア</button>
        </div>
      </div>
    </div>

    <div class="card result-card">
      <div id="status" class="status">場所または現在地から判定してください。</div>
      <div id="summary" class="result ng">まだ判定していません。</div>
      <p id="leadText" class="lead caution-note">最初に利用申請を送信すると、このページの検索・判定機能が使えるようになります。</p>
    </div>

    <div class="card">
      <strong>お問い合わせ・ご要望</strong>
      <p class="mini">誤判定の可能性、追加してほしい道路、使い方に関するご質問があればお知らせください。</p>

      <form
        id="contactForm"
        action="https://script.google.com/macros/s/AKfycbwUAp7JpqL8httKfTZTdceBI_piC5a7dATTPFy5Fk4RHrXzcyC04JHAuIfpwZerlXJ5/exec"
        method="POST"
        target="contact_iframe"
      >
        <div class="grid1" style="margin-top:12px;">
          <div>
            <label for="contactType">問い合わせ種別</label>
            <select id="contactType" name="contactType" required>
              <option value="">選択してください</option>
              <option value="誤判定の可能性">誤判定の可能性</option>
              <option value="道路追加要望">道路追加要望</option>
              <option value="使い方の質問">使い方の質問</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div>
            <label for="contactCompany">会社名</label>
            <input id="contactCompany" name="company" type="text" placeholder="株式会社〇〇">
          </div>

          <div class="grid2">
            <div>
              <label for="contactName">氏名</label>
              <input id="contactName" name="name" type="text" placeholder="山田 太郎" required>
            </div>
            <div>
              <label for="contactEmail">メールアドレス</label>
              <input id="contactEmail" name="email" type="email" placeholder="example@company.co.jp" required>
            </div>
          </div>

          <div>
            <label for="contactPhone">電話番号</label>
            <input id="contactPhone" name="phone" type="tel" placeholder="090-1234-5678">
          </div>

          <div>
            <label for="contactAddress">対象住所・場所</label>
            <input id="contactAddress" name="targetAddress" type="text" placeholder="例：東京都江東区青海4丁目4-18">
          </div>

          <div>
            <label for="contactMessage">内容</label>
            <textarea
              id="contactMessage"
              name="message"
              rows="5"
              placeholder="誤判定と思われる内容、追加してほしい道路、使い方の質問などを入力してください。"
              required
            ></textarea>
          </div>
        </div>

        <input type="hidden" id="contactPage" name="page" value="">
        <input type="hidden" id="contactUserAgent" name="userAgent" value="">

        <div class="row" style="margin-top:12px;">
          <button id="contactSubmit" type="submit">問い合わせを送信</button>
        </div>
      </form>

      <div id="contactStatus" class="status">内容を入力して送信してください。</div>

      <div class="row" style="margin-top:12px;">
        <button id="showEmailCard" type="button" class="secondary">メール再登録</button>
      </div>
    </div>
  </div>
</aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

<script src="./app.js"></script>
</body>
</html>
